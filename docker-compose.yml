version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile-app
    container_name: express_api
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "${PORT}:${PORT}"
      - "3000:3000"
      - "9229:9229"
    environment:
      - CHOKIDAR_USEPOLLING=1

  db:
    build:
      context: .
      dockerfile: Dockerfile-db
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: db
      POSTGRES_PASSWORD: db
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: